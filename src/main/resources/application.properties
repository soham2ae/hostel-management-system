# ===============================
# Application
# ===============================
spring.application.name=hostel-management-system
server.port=8080

# ===============================
# Datasource (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/hostel_management?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
# Development phase: allow schema to evolve automatically.
# Will be switched to "validate" in production. Never use "create-drop".
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Avoid LazyInitializationException by forcing services to manage
# their own transactions/fetches instead of relying on an open session
# spanning the view layer.
spring.jpa.open-in-view=false

# ===============================
# Thymeleaf
# ===============================
# Disabled during development so template changes are reflected
# without a restart. Enable in production for performance.
spring.thymeleaf.cache=false

# ===============================
# Multipart Upload (payment screenshots)
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# File Storage
# ===============================
# Payment screenshots are stored on disk outside the classpath.
# Only the file path is persisted in the database.
app.file-storage.payments-dir=uploads/payments

# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# Character Encoding
# ===============================
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# ===============================
# Timezone
# ===============================
spring.jackson.time-zone=Asia/Kolkata
